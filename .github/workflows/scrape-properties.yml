name: Daily Kraimorie Property Tracker

on:
  schedule:
    # Run daily at 1:00 AM UTC (3:00 AM Bulgarian time)
    - cron: '0 1 * * *'

  # Allow manual triggering
  workflow_dispatch:

  # Run on push to main for testing
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        # Need full history to preserve previous results
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests lxml

    - name: Run daily Kraimorie tracking
      run: |
        echo "Starting daily Kraimorie property tracking..."
        python daily_tracker.py

    - name: Commit results
      run: |
        git config --global user.name 'Kraimorie Tracker Bot'
        git config --global user.email 'action@github.com'
        git add data/ docs/
        git diff --staged --quiet || git commit -m "Daily Kraimorie tracking update $(date '+%Y-%m-%d %H:%M')"
        git push

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4