name: 🏠 Property Scraper

on:
  schedule:
    # Run daily at 8:00 AM UTC (adjust for your timezone)
    - cron: '0 8 * * *'

  # Allow manual triggering
  workflow_dispatch:

  # Run on push to main for testing
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 🔄 Checkout repository
      uses: actions/checkout@v5
      with:
        # Need full history to preserve previous results
        fetch-depth: 0

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🏠 Run property scraper
      run: |
        echo "🔍 Checking files..."
        ls -la
        echo "🔍 Checking Python version..."
        python --version
        echo "🔍 Checking dependencies..."
        pip list | grep -E "(requests|beautifulsoup|lxml)"
        echo "🔍 Testing imports..."
        python -c "import sys; sys.path.append('src'); from property_scraper import AloPropertyScraper; print('✅ Imports working')"
        echo "🔍 Running scraper..."
        python github_scraper.py
      env:
        PYTHONPATH: src

    - name: 📊 Generate website
      run: |
        python generate_website.py

    - name: 💾 Commit results
      run: |
        git config --global user.name 'Property Scraper Bot'
        git config --global user.email 'action@github.com'
        git add data/ docs/
        git diff --staged --quiet || git commit -m "🏠 Update properties $(date '+%Y-%m-%d %H:%M')"
        git push

    - name: 📤 Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs

    - name: 🌐 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4