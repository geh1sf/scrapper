# Property Search Filters Configuration
# Edit these values to change your search criteria

locations:
  - city: "София"    # Sofia
    region_id: 22
    location_ids: 4342
  - city: "Бургас"   # Burgas (all areas including Kraimorie)
    region_id: 2
    location_ids: null  # Will search all Burgas region
  # Add more cities here as needed

# Kraimorie-specific filters
kraimorie_keywords:
  - "крайморие"
  - "kraimorie"
  - "краймориe"

# Property types to search
search_property_types:
  - "apartments"  # Apartments/rooms
  - "houses"      # Houses/villas

property_type:
  - "Тристаен"    # 3-room apartment
  - "Двустаен"    # 2-room apartment
  - "Четиристаен" # 4-room apartment
  - "къща"        # house
  - "вила"        # villa

price_range:
  min: 100000  # Minimum price in BGN
  max: 300000  # Maximum price in BGN

features:
  min_floor: 1     # Minimum floor (0 for ground floor)
  max_floor: 10    # Maximum floor
  min_area: 60     # Minimum area in square meters
  max_area: 120    # Maximum area in square meters

# Advanced filters (optional)
exclude_keywords:
  - "гараж"      # garage
  - "мазе"       # basement

include_keywords: []  # General keywords
  # - "паркинг"    # parking
  # - "тераса"     # terrace

# Lister/Agent filters
preferred_listers:
  []  # Add agent/company names you prefer
  # - "Agency Name"
  # - "Agent Name"

excluded_listers:
  []  # Add agent/company names to avoid
  # - "Unwanted Agency"