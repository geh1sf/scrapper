# Property Search Filters Configuration
# Edit these values to change your search criteria

locations:
  - city: "Kraimorie"   # Kraimorie specifically
    region_id: 2
    location_ids: 300
    section_ids: 25  # The missing piece!

# Removed - using correct location_ids + section_ids now

# Property types to search - apartments and houses only
search_property_types:
  - "apartments"    # All apartment types
  - "houses"        # All house/villa types

property_type:
  # All Apartment Types
  - "Едностаен"   # 1-room apartment
  - "Двустаен"    # 2-room apartment
  - "Тристаен"    # 3-room apartment
  - "Четиристаен" # 4-room apartment
  - "Петстаен"    # 5-room apartment
  - "Мезонет"     # maisonette
  - "Студио"      # studio
  - "апартамент"  # general apartment
  # All House Types
  - "къща"        # house
  - "вила"        # villa
  - "таунхаус"    # townhouse
  - "еднофамилна" # single-family house

price_range:
  min: 50000   # Minimum price in BGN (for all property types)
  max: 800000  # Maximum price in BGN (to include houses/villas)

features:
  min_area: 30     # Minimum area in sqm
  max_area: 300    # Maximum area in sqm (suitable for houses)

# Advanced filters (optional)
exclude_keywords:
  - "гараж"      # garage
  - "мазе"       # basement

include_keywords: []  # General keywords
  # - "паркинг"    # parking
  # - "тераса"     # terrace

# Lister/Agent filters - NO RESTRICTIONS (show all agencies)
preferred_listers: []  # No restrictions - show all agencies

excluded_listers: []   # No excluded agencies